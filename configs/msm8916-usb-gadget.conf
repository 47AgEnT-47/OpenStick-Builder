#!/bin/sh
# MSM8916 USB Gadget Configuration

# USB Functions Enable/Disable
ENABLE_RNDIS=1
ENABLE_ECM=0
ENABLE_NCM=0
ENABLE_UMS=0
ENABLE_ACM=1

# УБРАТЬ NETWORK_BRIDGE

# UMS Configuration
UMS_IMAGE="/var/lib/msm8916-gadget/usb_mass_storage.img"
UMS_IMAGE_SIZE="100M"
UMS_READONLY=0

# ACM Configuration
ACM_COUNT=1

# OTG Host Mode Configuration
ENABLE_OTG_HOST=0

# UDC Device
UDC_DEVICE=""

# USB Device Identification
USB_VENDOR_ID="0x1d6b"
USB_PRODUCT_ID="0x0104"
USB_DEVICE_VERSION="0x0100"
USB_MANUFACTURER="MSM8916"
USB_PRODUCT="USB Gadget"
