no-resolv
server=127.0.0.1#5353
domain-needed
bogus-priv
cache-size=0

interface=usb0
interface=wlan0
bind-dynamic
dhcp-authoritative

dhcp-range=192.168.100.10,192.168.100.99,255.255.255.0,12h
dhcp-range=192.168.200.10,192.168.200.99,255.255.255.0,12h

domain=lan,192.168.100.0/24
local=/lan/
expand-hosts

dhcp-option=252,"\n"
dhcp-option=vendor:MSFT,2,1i
