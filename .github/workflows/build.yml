name: Build

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  decide:
    runs-on: ubuntu-24.04-arm
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - id: check
        name: Check commit message for skip directive
        run: |
          msg="${{ github.event.head_commit.message }}"
          subject="${msg%%$'\n'*}"
          body="${msg#*$'\n'}"
          first_body_line="$(printf "%s" "$body" | awk 'NF{print; exit}')"
          skip="false"
          case "$subject" in
            "skip build:"*) skip="true" ;;
          esac
          case "$first_body_line" in
            "skip build:"*) skip="true" ;;
          esac
          echo "skip=$skip" >> "$GITHUB_OUTPUT"

  build:
    needs: decide
    if: needs.decide.outputs.skip != 'true'
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install dependencies
        run: sudo sh -e scripts/install_deps.sh

      - name: Build hyp and aboot firmware
        run: sudo sh -e scripts/build_hyp_aboot.sh

      - name: Extract firmware
        run: sudo sh -e scripts/extract_fw.sh

      - name: Create rootfs
        run: sudo sh -e scripts/debootstrap.sh

      - name: Build gadget-tool
        run: sudo sh -e scripts/build_gt.sh

      - name: Create images
        run: sudo sh -e scripts/build_images.sh


      - name: Prepare build metadata and package
        id: meta
        shell: bash
        run: |
          # 1. Логика имен
          case "$GITHUB_REF_NAME" in
            debian)       HUMAN="Debian"; BASE="openstick-debian" ;;
            ubuntu-24.04) HUMAN="Ubuntu 24.04 (Noble)"; BASE="openstick-ubuntu" ;;
            ubuntu-*)     HUMAN="Ubuntu ${GITHUB_REF_NAME#ubuntu-}"; BASE="openstick-ubuntu" ;;
            *)
              CLEAN=$(echo "$GITHUB_REF_NAME" | tr '[:upper:]' '[:lower:]' | tr -c 'a-z0-9' '-')
              BASE="openstick-${CLEAN%-}"
              HUMAN=$(echo "$GITHUB_REF_NAME" | sed -r 's/(^|-)([a-z])/\U \2/g' | xargs)
              ;;
          esac

          # 2. Создаем ZIP (он нужен для релиза)
          ZIP_NAME="${BASE}.zip"
          cd files && zip -r "../$ZIP_NAME" . && cd ..

          # 3. Вывод переменных
          echo "base=$BASE" >> "$GITHUB_OUTPUT"
          echo "zip=$ZIP_NAME" >> "$GITHUB_OUTPUT"
          echo "human=$HUMAN" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.base }}
          path: ${{ steps.meta.outputs.zip }} # Загружаем уже готовый zip, чтобы не было матрешки

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="build-${GITHUB_SHA::8}"
          date_str="$(date -u +%Y-%m-%d)"
          
          gh release create "$tag" \
            --target "$GITHUB_SHA" \
            --title "${{ steps.meta.outputs.human }} build: $date_str" \
            --notes "Automated release for commit ${GITHUB_SHA} on ${GITHUB_REF_NAME}" \
            --prerelease \
            "${{ steps.meta.outputs.zip }}"
