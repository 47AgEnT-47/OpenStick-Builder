name: Build
on: [workflow_dispatch] # Добавил push, чтобы не только вручную жать кнопку

permissions:
  contents: write

jobs:
  build:
    # Пропускаем, если в коммите есть 'skip build' (стандартный механизм GitHub)
    if: "!contains(github.event.head_commit.message, 'skip build')"
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Build System
        run: |
          sudo sh -e scripts/install_deps.sh
          sudo sh -e scripts/build_hyp_aboot.sh
          sudo sh -e scripts/extract_fw.sh
          sudo sh -e scripts/debootstrap.sh
          sudo sh -e scripts/build_gt.sh
          sudo sh -e scripts/build_images.sh

      - name: Release and Artifact
        id: meta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Определяем имена
          case "$GITHUB_REF_NAME" in
            debian)   H="Debian"; B="openstick-debian" ;;
            ubuntu-*) H="Ubuntu ${GITHUB_REF_NAME#ubuntu-}"; B="openstick-ubuntu" ;;
            *)        H="Build"; B="openstick-${GITHUB_REF_NAME//[^a-z0-9]/-}" ;;
          esac
          
          # Один релиз на ветку (перезаписываемый)
          TAG="latest-${B}"
          zip -rj "$B.zip" files/
          
          gh release create "$TAG" "$B.zip" --title "$H Latest" --clobber --prerelease
          echo "base=$B" >> "$GITHUB_OUTPUT"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.base }}
          path: files/
