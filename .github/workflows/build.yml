name: Build
on: [workflow_dispatch]

permissions:
  contents: write

jobs:
  build:
    # Пропускаем, если в коммите есть 'skip build' (стандартный механизм GitHub)
    if: "!contains(github.event.head_commit.message, 'skip build')"
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install dependencies
        run: sudo sh -e scripts/install_deps.sh
        
      - name: Build hyp and aboot firmware
        run: sudo sh -e scripts/build_hyp_aboot.sh

      - name: Extract firmware
        run: sudo sh -e scripts/extract_fw.sh
        
      - name: Create rootfs
        run: sudo sh -e scripts/debootstrap.sh

      - name: Build gadget-tool
        run: sudo sh -e scripts/build_gt.sh
        
      - name: Create images
        run: sudo sh -e scripts/build_images.sh


      - name: Release and Artifact
        id: meta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Имена
          case "$GITHUB_REF_NAME" in
            debian)   H="Debian"; B="openstick-debian" ;;
            ubuntu-*) H="Ubuntu ${GITHUB_REF_NAME#ubuntu-}"; B="openstick-ubuntu" ;;
            *)        H="Build"; B="openstick-${GITHUB_REF_NAME//[^a-z0-9]/-}" ;;
          esac
          
          TAG="latest-${B}"
          zip -rj "$B.zip" files/

          # 2. Умный релиз: создаем, если нет, или просто заливаем файл, если есть
          gh release create "$TAG" --title "$H Latest" --prerelease "$B.zip" 2>/dev/null || \
          gh release upload "$TAG" "$B.zip" --clobber

          echo "base=$B" >> "$GITHUB_OUTPUT"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.base }}
          path: files/
