name: Build
on: [workflow_dispatch]

permissions:
  contents: write

jobs:
  build:
    if: "!contains(github.event.head_commit.message, 'skip build')"
    runs-on: ubuntu-24.04-arm
    container:
      image: ghcr.io/47agent-47/openstick-builder/build-env:latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Build hyp and aboot firmware
        run: sh -e scripts/build_hyp_aboot.sh

      - name: Extract firmware
        run: sh -e scripts/extract_fw.sh
        
      - name: Create rootfs
        run: sh -e scripts/debootstrap.sh

      - name: Build gadget-tool
        run: sh -e scripts/build_gt.sh
        
      - name: Create images
        run: sh -e scripts/build_images.sh

      - name: Prepare build metadata
        id: meta
        shell: bash
        run: |
          # 1. Логика имен
          case "$GITHUB_REF_NAME" in
            debian)   H="Debian"; B="openstick-debian" ;;
            ubuntu-*) H="Ubuntu ${GITHUB_REF_NAME#ubuntu-}"; B="openstick-ubuntu" ;;
            *)        H="Build"; B="openstick-${GITHUB_REF_NAME//[^a-z0-9]/-}" ;;
          esac
          
          # 2. Создаем ZIP для релиза
          zip -rj "$B.zip" files/
          
          # 3. Выплевываем переменные для следующих шагов
          echo "base=$B" >> "$GITHUB_OUTPUT"
          echo "human=$H" >> "$GITHUB_OUTPUT"
          echo "zip=$B.zip" >> "$GITHUB_OUTPUT"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.base }}
          path: files/

      - name: Update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="latest-${{ steps.meta.outputs.base }}"
          FILE="${{ steps.meta.outputs.zip }}"
          TITLE="${{ steps.meta.outputs.human }} Latest"

          # Сначала пробуем создать, если не вышло (уже есть) — просто перезаливаем файл
          gh release create "$TAG" --title "$TITLE" --prerelease "$FILE" 2>/dev/null || \
          gh release upload "$TAG" "$FILE" --clobber
